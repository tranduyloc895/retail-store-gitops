apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cart
  namespace: retail-store
  labels:
    app: cart
    release: kps
spec:
  selector:
    matchLabels:
      app: cart
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s