apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: retail-store
  labels:
    app: catalog
    app.kubernetes.io/name: catalog
    app.kubernetes.io/part-of: retail-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
        - name: catalog
          image: 736508008585.dkr.ecr.ap-southeast-1.amazonaws.com/retail-store/catalog:9878c8d
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 128m
              memory: 128Mi
            limits:
              cpu: 256m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
