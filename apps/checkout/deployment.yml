apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: retail-store
  labels:
    app: checkout
    app.kubernetes.io/name: checkout
    app.kubernetes.io/part-of: retail-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          image: 736508008585.dkr.ecr.ap-southeast-1.amazonaws.com/retail-store/checkout:e8a9e0f
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 256m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 15
