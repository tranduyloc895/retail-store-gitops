apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 58.0.0
      helm:
        releaseName: kps
        valueFiles:
          - $values/platform/monitoring/values-kube-prometheus-stack.yaml
    - repoURL: https://github.com/tranduyloc895/retail-store-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - ServerSideApply=true       # CRD lớn, tránh annotation limit
      - CreateNamespace=false      # Namespace do Application khác tạo
    retry:
      limit: 5
      backoff: { duration: 30s, maxDuration: 5m, factor: 2 }
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields