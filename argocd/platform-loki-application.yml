apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: 6.6.0
      helm:
        releaseName: loki
        valueFiles:
          - $values/platform/monitoring/values-loki.yaml
    - repoURL: https://github.com/tranduyloc895/retail-store-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: ["ServerSideApply=true"]
    retry:
      limit: 5
      backoff: { duration: 30s, maxDuration: 5m, factor: 2 }