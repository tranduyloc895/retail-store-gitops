apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring

configMapGenerator:
  - name: dashboard-node-exporter-full
    files: [node-exporter-full.json]
    options:
      annotations: { grafana_folder: Kubernetes }
      labels: { grafana_dashboard: "1" }
  - name: dashboard-k8s-cluster-monitoring
    files: [k8s-cluster-monitoring.json]
    options:
      annotations: { grafana_folder: Kubernetes }
      labels: { grafana_dashboard: "1" }
  - name: dashboard-logs-app-loki
    files: [logs-app-loki.json]
    options:
      annotations: { grafana_folder: Kubernetes }
      labels: { grafana_dashboard: "1" }
  - name: dashboard-k8s-views-pods
    files: [k8s-views-pods.json]
    options:
      annotations: { grafana_folder: Kubernetes }
      labels: { grafana_dashboard: "1" }

  # === Phase 3.3: 3 dashboard RED cho 5 microservices ===
  - name: dashboard-microservices-spring-boot
    files: [microservices-spring-boot.json]
    options:
      annotations: { grafana_folder: Microservices }
      labels: { grafana_dashboard: "1" }
  - name: dashboard-microservices-go
    files: [microservices-go.json]
    options:
      annotations: { grafana_folder: Microservices }
      labels: { grafana_dashboard: "1" }
  - name: dashboard-microservices-nestjs
    files: [microservices-nestjs.json]
    options:
      annotations: { grafana_folder: Microservices }
      labels: { grafana_dashboard: "1" }

generatorOptions:
  disableNameSuffixHash: true